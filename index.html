<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renlak OT 2026 - Versi Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { 
            --primary-green: #2e7d32; 
            --secondary-green: #f1f8e9; 
            --sidebar-width: 260px; 
        }
        
        body { 
            background-color: #f4f7f6; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* Sidebar Styles */
        .sidebar { 
            height: 100vh; 
            background: white; 
            border-right: 1px solid #dee2e6;  
            position: fixed;  
            width: var(--sidebar-width);  
            z-index: 1000; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            left: 0;
            top: 0;
        }

        /* State Sidebar Tertutup */
        .sidebar.collapsed {
            left: calc(var(--sidebar-width) * -1);
        }

        .nav-link { 
            color: #555; 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            border-radius: 8px; 
            margin: 5px 15px; 
            text-decoration: none; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        
        .nav-link:hover { 
            background-color: var(--secondary-green); 
            color: var(--primary-green); 
        }
        
        .nav-link.active { 
            background-color: var(--primary-green); 
            color: white !important; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        .nav-link i { 
            margin-right: 12px; 
            font-size: 20px; 
        }

        /* Main Content Styles */
        .main-content { 
            margin-left: var(--sidebar-width); 
            padding: 40px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Content saat Sidebar Tertutup */
        .main-content.expanded {
            margin-left: 0;
        }

        .form-container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        
        .header-section { 
            margin-bottom: 30px; 
            border-left: 5px solid var(--primary-green); 
            padding-left: 15px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ← PERBAIKAN BUTTON BURGER */
        #btnToggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary-green);
        }

        #btnToggle:hover {
            opacity: 0.7;
        }

        /* Sidebar Overlay untuk Mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            :root {
                --sidebar-width: 260px;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .form-container {
                padding: 20px;
            }

            .header-section {
                margin-bottom: 20px;
            }

            /* Sidebar di mobile harus tetap visible saat di-toggle */
            .sidebar {
                left: -260px;
            }

            .sidebar.show {
                left: 0;
            }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar shadow-sm" id="sidebar">
    <div class="p-4 mb-3 text-center border-bottom">
        <h4 class="fw-bold text-success mb-0">App OT 2026</h4>
    </div>
    <nav class="nav flex-column">
        <a class="nav-link active" id="menuInput" onclick="showPage('input')"><i class="material-icons">edit_note</i> Input Data</a>
        <a class="nav-link" id="menuCluster" onclick="showPage('cluster')"><i class="material-icons">search</i> Cari Produsen</a>
        <a class="nav-link" href="https://docs.google.com/spreadsheets/d/1bOhGfFBwI7uOi8j_Lq40EbAqBP_LZGh9ixhO7e_4y1w/edit" target="_blank"><i class="material-icons">storage</i> Lihat Sheet</a>
    </nav>
</div>

<div class="main-content" id="mainContent">
    <div class="header-section">
        <div><h2 class="fw-bold m-0" style="font-size: 1.5rem;">Renlak OT 2026</h2></div>
        <button id="btnToggle" onclick="toggleSidebar()" title="Menu">
            <i class="material-icons">menu</i>
        </button>
    </div>

    <div id="sectionInput">
        <div class="form-container">
            <form id="samplingForm" class="row g-3">
                <div class="col-6 col-md-3">
                    <label>Tanggal</label>
                    <input type="text" id="tglSampling" class="form-control bg-light" readonly>
                </div>
                <div class="col-6 col-md-3">
                    <label>Bulan</label>
                    <input type="text" id="bulanAuto" class="form-control bg-light text-center fw-bold" readonly>
                </div>
                <div class="col-md-6">
                    <label>Petugas</label>
                    <input type="text" id="petugas" class="form-control" placeholder="Nama Petugas" required>
                </div>
                
                <div class="col-md-12">
                    <label>Nama Produk / Produsen</label>
                    <div class="input-group">
                        <input type="text" id="namaProduk" class="form-control" 
                               placeholder="Ketik nama atau cari di database..." 
                               onblur="triggerAutoHide()"
                               required>
                        <button class="btn btn-success" type="button" onclick="showPage('cluster')">CARI DB</button>
                    </div>
                </div>

                <div class="col-md-6">
                    <label>Kategori</label>
                    <select id="kategori" class="form-select" required>
                        <option value="">Pilih...</option>
                        <option>Sampel Produk dari Produsen dengan Riwayat TMS</option>
                        <option>Produk UMK Setempat / Unggulan Daerah</option>
                        <option>Depot Jamu / Toko Herbal</option>
                        <option>Produk OT Import</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label>Sub Kategori</label>
                    <select id="subKategori" class="form-select" required>
                        <option value="">Pilih...</option>
                        <option>Demam/ Sakit Kepala</option>
                        <option>Stamina Pria</option>
                        <option>Pegel Linu</option>
                        <option>Pelangsing</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Metode</label>
                    <select id="metode" class="form-select">
                        <option>Offline</option>
                        <option>Online</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label>Tempat Sampling</label>
                    <input type="text" id="tempatSampling" class="form-control" placeholder="Nama Sarana">
                </div>
                
                <div class="col-md-4">
                    <label>NIE</label>
                    <input type="text" id="nie" class="form-control">
                </div>
                <div class="col-md-4">
                    <label>Batch</label>
                    <input type="text" id="noBatch" class="form-control">
                </div>
                <div class="col-md-4">
                    <label>Exp Date</label>
                    <input type="text" id="expDate" class="form-control">
                </div>

                <div class="col-12 text-end mt-4">
                    <button type="submit" id="btnSimpan" class="btn btn-success w-100 py-2 fw-bold">KIRIM KE GOOGLE SHEET</button>
                </div>
            </form>
        </div>
    </div>

    <div id="sectionCluster" style="display:none;">
        <div class="form-container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold m-0">Database Produsen</h5>
                <button class="btn btn-sm btn-outline-secondary" onclick="showPage('input')">Kembali</button>
            </div>
            <input type="text" id="lookupInput" class="form-control mb-4" placeholder="Ketik nama produsen..." onkeyup="doLookup()">
            <div id="lookupResults" style="max-height: 60vh; overflow-y: auto;"></div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // 1. DATABASE LENGKAP PRODUSEN
    // ============================================
    const dbProdusen = [
        { nama: "Agung Medica Indonesia", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Agro Terra Makmur", klaster: "B", riwayat: "Alt" },
        { nama: "CV Agung Mandiri Kuat", klaster: "C", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Agung Prima", klaster: "C", riwayat: "tidak ada" },
        { nama: "CV Akar Daun", klaster: "C", riwayat: "tidak ada" },
        { nama: "CV Al Manar Herbafit", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Al-afiat sehat alami", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Alam Hijau Selaras", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Albaik Herbal Indonesia", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Albiruni Sukses Bersinar", klaster: "C", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Al-Ghuroba", klaster: "B", riwayat: "ka, akk, alt, entero" },
        { nama: "CV Amal Ahmada Arba'a", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Arbain Jaya Mandiri", klaster: "B", riwayat: "kadar etanol, clostridia. kadar air, AKK" },
        { nama: "CV ardhi Jaya", klaster: "B", riwayat: "alt, akk, ka" },
        { nama: "CV Ash Shihhah Sejahtera", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV As-Shohwah Herbal", klaster: "C", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Asy syifa", klaster: "B", riwayat: "alt, akk, ka, coff" },
        { nama: "CV Att Thollah", klaster: "B", riwayat: "kadar etanol" },
        { nama: "CV Basmallah Food", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Berkah Alam", klaster: "B", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Bin Dawood", klaster: "A", riwayat: "ada tapi belum ditulis" },
        { nama: "CV Bumi Cloud", klaster: "B", riwayat: "volume terpindahkan" },
        { nama: "CV Bumi Wijaya", klaster: "B", riwayat: "akk" },
        // ... (data produsen lainnya - sama seperti sebelumnya) ...
        { nama: "UD San sidarta", klaster: "B", riwayat: "ada tapi belum ditulis" }
    ];

    // ============================================
    // 2. FUNGSI SIDEBAR & NAVIGASI
    // ============================================
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const overlay = document.getElementById('overlay');
        
        if (window.innerWidth <= 768) {
            // Mobile: toggle show/hide
            sidebar.classList.toggle('show');
            overlay.classList.toggle('active');
        } else {
            // Desktop: toggle collapsed
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        }
    }

    function showPage(pageId) {
        document.getElementById('sectionInput').style.display = pageId === 'input' ? 'block' : 'none';
        document.getElementById('sectionCluster').style.display = pageId === 'cluster' ? 'block' : 'none';
        
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(pageId === 'input' ? 'menuInput' : 'menuCluster').classList.add('active');

        if (window.innerWidth <= 768) {
            // Close sidebar after selecting menu on mobile
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (sidebar.classList.contains('show')) {
                sidebar.classList.remove('show');
                overlay.classList.remove('active');
            }
        }
    }

    // ============================================
    // 3. GENERATE TIMESTAMP & BULAN OTOMATIS
    // ============================================
    function generateTimestamp() {
        const d = new Date();
        document.getElementById('tglSampling').value = d.toLocaleString('id-ID');
        document.getElementById('bulanAuto').value = String(d.getMonth() + 1).padStart(2, '0');
    }

    window.onload = generateTimestamp;

    // ============================================
    // 4. TRIGGER AUTO HIDE SAAT BLUR NAMA PRODUK
    // ============================================
    function triggerAutoHide() {
        const hideUrl = 'https://script.google.com/macros/s/AKfycbwOUkiEhvpILxVWVyATFs7fhIggFdM_cgfBJmadLX-kJV7gaEGy7eyLhsVcLCULj72d/exec';
        
        fetch(hideUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'hideRows' })
        })
        .then(() => console.log("Auto hide processed"))
        .catch(err => console.log("Auto hide error:", err));
    }

    // ============================================
    // 5. FUNGSI KIRIM DATA KE GOOGLE SHEET
    // ============================================
    document.getElementById('samplingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerHTML = "Mengirim...";

        const scriptURL = 'https://script.google.com/macros/s/AKfycbwOUkiEhvpILxVWVyATFs7fhIggFdM_cgfBJmadLX-kJV7gaEGy7eyLhsVcLCULj72d/exec';
        
        const data = {
            tanggal: document.getElementById('tglSampling').value,
            produk: document.getElementById('namaProduk').value,
            kategori: document.getElementById('kategori').value,
            subKategori: document.getElementById('subKategori').value,
            metode: document.getElementById('metode').value,
            nie: document.getElementById('nie').value,
            batch: document.getElementById('noBatch').value,
            expired: document.getElementById('expDate').value,
            tempat: document.getElementById('tempatSampling').value,
            bulan: document.getElementById('bulanAuto').value,
            petugas: document.getElementById('petugas').value
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("✅ Data Berhasil Terkirim!");
            document.getElementById('samplingForm').reset();
            generateTimestamp();
        })
        .catch(() => alert("❌ Gagal Kirim."))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "KIRIM KE GOOGLE SHEET";
        });
    });

    // ============================================
    // 6. FUNGSI SEARCH & LOOKUP PRODUSEN
    // ============================================
    function doLookup() {
        const val = document.getElementById('lookupInput').value.toLowerCase();
        const container = document.getElementById('lookupResults');
        if (val.length < 2) {
            container.innerHTML = "";
            return;
        }

        const filtered = dbProdusen.filter(i => i.nama.toLowerCase().includes(val)).slice(0, 10);
        
        container.innerHTML = filtered.map(item => `
            <div class="card lookup-card klaster-${item.klaster} p-3 mb-2" onclick="pilihProdusen('${item.nama.replace(/'/g, "\\'")}')">
                <div class="d-flex justify-content-between">
                    <h6 class="fw-bold mb-0">${item.nama}</h6>
                    <span class="badge ${item.klaster==='A'?'bg-success':'bg-warning text-dark'}">KLASTER ${item.klaster}</span>
                </div>
                <small>Riwayat: ${item.riwayat}</small>
            </div>
        `).join('');
    }

    function pilihProdusen(n) {
        document.getElementById('namaProduk').value = n;
        showPage('input');
    }
</script>

</body>
</html>
