<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Renlak OT 2026 - Versi Final</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { 
            --primary-green: #2e7d32; 
            --secondary-green: #f1f8e9; 
            --sidebar-width: 260px; 
        }
        
        body { 
            background-color: #f4f7f6; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* Sidebar Styles */
        .sidebar { 
            height: 100vh; 
            background: white; 
            border-right: 1px solid #dee2e6;  
            position: fixed;  
            width: var(--sidebar-width);  
            z-index: 1000; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            left: 0;
            top: 0;
        }

        /* State Sidebar Tertutup */
        .sidebar.collapsed {
            left: calc(var(--sidebar-width) * -1);
        }

        .nav-link { 
            color: #555; 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            border-radius: 8px; 
            margin: 5px 15px; 
            text-decoration: none; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        
        .nav-link:hover { 
            background-color: var(--secondary-green); 
            color: var(--primary-green); 
        }
        
        .nav-link.active { 
            background-color: var(--primary-green); 
            color: white !important; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        .nav-link i { 
            margin-right: 12px; 
            font-size: 20px; 
        }

        /* Main Content Styles */
        .main-content { 
            margin-left: var(--sidebar-width); 
            padding: 40px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Content saat Sidebar Tertutup */
        .main-content.expanded {
            margin-left: 0;
        }

        .form-container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        
        .header-section { 
            margin-bottom: 30px; 
            border-left: 5px solid var(--primary-green); 
            padding-left: 15px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ← PERBAIKAN BUTTON BURGER */
        #btnToggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary-green);
        }

        #btnToggle:hover {
            opacity: 0.7;
        }

        /* Sidebar Overlay untuk Mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            :root {
                --sidebar-width: 260px;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .form-container {
                padding: 20px;
            }

            .header-section {
                margin-bottom: 20px;
            }

            /* Sidebar di mobile harus tetap visible saat di-toggle */
            .sidebar {
                left: -260px;
            }

            .sidebar.show {
                left: 0;
            }
        }
    </style>
</head>

                    </div>
                </div>

                <div class="col-md-6">

                    <select id="kategori" class="form-select" required>

                <div class="col-md-6">

                </div>

                <div class="col-md-4">

                        <option>Offline</option>
                        <option>Online</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label>Tempat Sampling</label>
                    <input type="text" id="tempatSampling" class="form-control" placeholder="Nama Sarana">
                </div>
                
                <div class="col-md-4">
                    <label>NIE</label>
                    <input type="text" id="nie" class="form-control">
                </div>
                <div class="col-md-4">
                    <label>Batch</label>
                    <input type="text" id="noBatch" class="form-control">
                </div>
                <div class="col-md-4">
                    <label>Exp Date</label>

                </div>

                <div class="col-12 text-end mt-4">

            </form>

    // ============================================
    // 2. FUNGSI SIDEBAR & NAVIGASI
    // ============================================
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const overlay = document.getElementById('overlay');
        
        if (window.innerWidth <= 768) {
            // Mobile: toggle show/hide
            sidebar.classList.toggle('show');
            overlay.classList.toggle('active');
        } else {
            // Desktop: toggle collapsed
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        }
    }

    function showPage(pageId) {
        document.getElementById('sectionInput').style.display = pageId === 'input' ? 'block' : 'none';
        document.getElementById('sectionCluster').style.display = pageId === 'cluster' ? 'block' : 'none';
        
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(pageId === 'input' ? 'menuInput' : 'menuCluster').classList.add('active');

        if (window.innerWidth <= 768) {
            // Close sidebar after selecting menu on mobile
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (sidebar.classList.contains('show')) {
                sidebar.classList.remove('show');
                overlay.classList.remove('active');
            }
        }
    }

    // ============================================
    // 3. GENERATE TIMESTAMP & BULAN OTOMATIS
    // ============================================
    function generateTimestamp() {
        const d = new Date();
        document.getElementById('tglSampling').value = d.toLocaleString('id-ID');
        document.getElementById('bulanAuto').value = String(d.getMonth() + 1).padStart(2, '0');
    }

    window.onload = generateTimestamp;

    // ============================================
    // 4. TRIGGER AUTO HIDE SAAT BLUR NAMA PRODUK
    // ============================================
    function triggerAutoHide() {
        const hideUrl = 'https://script.google.com/macros/s/AKfycbwOUkiEhvpILxVWVyATFs7fhIggFdM_cgfBJmadLX-kJV7gaEGy7eyLhsVcLCULj72d/exec';
        
        fetch(hideUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'hideRows' })
        })
        .then(() => console.log("Auto hide processed"))
        .catch(err => console.log("Auto hide error:", err));
    }

    // ============================================
    // 5. FUNGSI KIRIM DATA KE GOOGLE SHEET
    // ============================================
    document.getElementById('samplingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerHTML = "Mengirim...";

        const scriptURL = 'https://script.google.com/macros/s/AKfycbwOUkiEhvpILxVWVyATFs7fhIggFdM_cgfBJmadLX-kJV7gaEGy7eyLhsVcLCULj72d/exec';
        
        const data = {
            tanggal: document.getElementById('tglSampling').value,
            produk: document.getElementById('namaProduk').value,
            kategori: document.getElementById('kategori').value,
            subKategori: document.getElementById('subKategori').value,
            metode: document.getElementById('metode').value,
            nie: document.getElementById('nie').value,
            batch: document.getElementById('noBatch').value,
            expired: document.getElementById('expDate').value,
            tempat: document.getElementById('tempatSampling').value,
            bulan: document.getElementById('bulanAuto').value,
            petugas: document.getElementById('petugas').value
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("✅ Data Berhasil Terkirim!");
            document.getElementById('samplingForm').reset();
            generateTimestamp();
        })
        .catch(() => alert("❌ Gagal Kirim."))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "KIRIM KE GOOGLE SHEET";
        });
    });

    // ============================================
    // 6. FUNGSI SEARCH & LOOKUP PRODUSEN
    // ============================================
    function doLookup() {
        const val = document.getElementById('lookupInput').value.toLowerCase();
        const container = document.getElementById('lookupResults');
        if (val.length < 2) {
            container.innerHTML = "";
            return;
        }

        const filtered = dbProdusen.filter(i => i.nama.toLowerCase().includes(val)).slice(0, 10);
        
        container.innerHTML = filtered.map(item => `
            <div class="card lookup-card klaster-${item.klaster} p-3 mb-2" onclick="pilihProdusen('${item.nama.replace(/'/g, "\\'")}')">
                <div class="d-flex justify-content-between">
                    <h6 class="fw-bold mb-0">${item.nama}</h6>
                    <span class="badge ${item.klaster==='A'?'bg-success':'bg-warning text-dark'}">KLASTER ${item.klaster}</span>
                </div>
                <small>Riwayat: ${item.riwayat}</small>
            </div>
        `).join('');
    }

    function pilihProdusen(n) {
        document.getElementById('namaProduk').value = n;
        showPage('input');
    }
